version: '3.1'

# Production mode behind Traefik.
# Requires a .env file with DB_PASSWORD and RESET_TOKEN.
# Run with: docker compose -f docker-compose.prod.yml up -d

services:

  db:
    image: mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MARIADB_ROOT_HOST: "%"
      MARIADB_DATABASE: Learning
    ports:
      # Direct DB access for DBeaver/IDEs.
      # Prefer SSH tunnel on servers exposed to the public internet.
      - "33306:3306"
    volumes:
      - type: bind
        source: ./src/init
        target: /docker-entrypoint-initdb.d
    networks:
      - internal

  reset-api:
    build: ./src/reset-api
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: Learning
      RESET_TOKEN: ${RESET_TOKEN:?RESET_TOKEN is required}
    volumes:
      - type: bind
        source: ./src/init
        target: /init
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.test-db-api.rule=Host(`test-db.alvaropenaruiz.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.test-db-api.entrypoints=websecure"
      - "traefik.http.routers.test-db-api.tls=true"
      - "traefik.http.routers.test-db-api.tls.certresolver=le"
      - "traefik.http.routers.test-db-api.middlewares=test-db-api-strip"
      - "traefik.http.middlewares.test-db-api-strip.stripprefix.prefixes=/api"
      - "traefik.http.services.test-db-api.loadbalancer.server.port=8081"
    depends_on:
      - db

networks:
  proxy:
    external: true
  internal:
