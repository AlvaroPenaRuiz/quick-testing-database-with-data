version: '3.1'

# Local / dev mode. For production with Traefik use docker-compose.prod.yml

services:

  db:
    image: mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MARIADB_DATABASE: Learning
    ports:
      - "3306:3306"
    volumes:
      - type: bind
        source: ./src/init
        target: /docker-entrypoint-initdb.d
    networks:
      - internal

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    networks:
      - internal

  reset-api:
    build: ./src/reset-api
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      DB_NAME: Learning
      RESET_TOKEN: ${RESET_TOKEN:-changeme}
    volumes:
      - type: bind
        source: ./src/init
        target: /init
    ports:
      - "8081:8081"
    networks:
      - internal
    depends_on:
      - db

networks:
  internal: